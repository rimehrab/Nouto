name: Android CI

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/**"
      - ".idea/"
      - "fastlane/"
      - ".gitignore"
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/**"
      - ".idea/"
      - "fastlane/"
      - ".gitignore"
      - "*.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: nouto-debug
          path: app/build/outputs/apk/debug/*.apk
          compression-level: 9
          retention-days: 30
